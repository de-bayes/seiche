<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="SISH mark: a Gaussian-hull buoy">
  <title>SISH mark</title>

  <!-- ============================================================
       SIMPLIFIED MARK  -  survives at 24px
       hull  = filled Gaussian with quantile bands (blue / yellow / red)
       mast  = stub tapered lattice; red sigma is the diagonal brace
       light = x-hat point-estimate dot
       water = one wave chord
       ============================================================ -->

  <!-- HULL: Gaussian area, three quantile bands -->
  <defs>
    <clipPath id="bellMark">
      <path d="M 78 392
               C 116 392, 134 380, 156 332
               C 182 274, 204 150, 256 150
               C 308 150, 330 274, 356 332
               C 378 380, 396 392, 434 392
               Z"/>
    </clipPath>
  </defs>
  <g clip-path="url(#bellMark)">
    <rect x="70" y="140" width="372" height="260" fill="#cdd9fb"/>
    <rect x="196" y="140" width="120" height="260" fill="#ffd02e"/>
    <rect x="242" y="140" width="28" height="260" fill="#e0312e"/>
  </g>
  <!-- bell outline + baseline -->
  <path d="M 78 392
           C 116 392, 134 380, 156 332
           C 182 274, 204 150, 256 150
           C 308 150, 330 274, 356 332
           C 378 380, 396 392, 434 392"
        fill="none" stroke="#1a1a1a" stroke-width="14" stroke-linejoin="round" stroke-linecap="round"/>
  <line x1="78" y1="392" x2="434" y2="392" stroke="#1a1a1a" stroke-width="14" stroke-linecap="round"/>

  <!-- DECK PLATE: green platform joining tower to hull -->
  <line x1="212" y1="150" x2="300" y2="150" stroke="#00a05a" stroke-width="16" stroke-linecap="round"/>

  <!-- MAST: stub tapered lattice (two converging legs) -->
  <line x1="218" y1="150" x2="242" y2="76" stroke="#1a1a1a" stroke-width="15" stroke-linecap="round"/>
  <line x1="294" y1="150" x2="270" y2="76" stroke="#1a1a1a" stroke-width="15" stroke-linecap="round"/>
  <!-- SIGMA BRACING: one bold sigma zigzag is the diagonal brace -->
  <path d="M 268 84 L 244 84 L 268 117 L 232 117 L 290 150 L 222 150"
        fill="none" stroke="#e0312e" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- short neck to the light -->
  <line x1="256" y1="76" x2="256" y2="56" stroke="#1a1a1a" stroke-width="13" stroke-linecap="round"/>

  <!-- LIGHT: x-hat dot on top -->
  <path d="M 232 30 L 256 6 L 280 30"
        fill="none" stroke="#1a1a1a" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="256" cy="50" r="12" fill="#e0312e" stroke="#1a1a1a" stroke-width="6"/>

  <!-- one waterline wave under the hull -->
  <path d="M 56 430
           C 106 408, 156 408, 206 430
           S 306 452, 356 430
           S 456 408, 472 422"
        fill="none" stroke="#2456e6" stroke-width="14" stroke-linecap="round"/>
</svg>
